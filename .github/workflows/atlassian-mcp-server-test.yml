name: Atlassian MCP Server Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "plugins/bitwarden-atlassian-tools/mcp/bitwarden-atlassian-mcp-server/**"
      - ".github/workflows/atlassian-mcp-server-test.yml"
      - ".nvmrc"
  push:
    branches:
      - main
    paths:
      - "plugins/bitwarden-atlassian-tools/mcp/bitwarden-atlassian-mcp-server/**"
      - ".github/workflows/atlassian-mcp-server-test.yml"
      - ".nvmrc"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    working-directory: plugins/bitwarden-atlassian-tools/mcp/bitwarden-atlassian-mcp-server

jobs:
  testing:
    name: Run tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Node version
        id: retrieve-node-version
        working-directory: ${{ github.workspace }}
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.retrieve-node-version.outputs.node_version }}

      - name: Set up pnpm via Corepack
        run: |
          corepack enable
          corepack prepare --activate

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('plugins/bitwarden-atlassian-tools/mcp/bitwarden-atlassian-mcp-server/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
