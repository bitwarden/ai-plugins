<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- guidance from main agent -->
  <rect x="20" y="53" width="160" height="44" rx="4" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="100" y="72" text-anchor="middle" font-size="13" fill="#1e293b">guidance from</text>
  <text x="100" y="88" text-anchor="middle" font-size="13" fill="#1e293b">main agent</text>

  <!-- Arrow: guidance → health-evaluator -->
  <line x1="180" y1="75" x2="258" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- health-evaluator -->
  <rect x="260" y="53" width="160" height="44" rx="4" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="340" y="72" text-anchor="middle" font-size="13" fill="#1e293b">health-evaluator</text>
  <text x="340" y="88" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">agent</text>

  <!-- Arrow: health-evaluator → evaluator feedback -->
  <line x1="420" y1="75" x2="498" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- evaluator feedback -->
  <rect x="500" y="53" width="160" height="44" rx="4" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="580" y="72" text-anchor="middle" font-size="13" fill="#1e293b">evaluator</text>
  <text x="580" y="88" text-anchor="middle" font-size="13" fill="#1e293b">feedback</text>

  <!-- Arrow: guide-on-situational-awareness → health-evaluator (zig-zag) -->
  <path d="M 210 158 L 210 127 L 310 127 L 310 97" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: evaluate-health → health-evaluator (zig-zag) -->
  <path d="M 490 158 L 490 127 L 370 127 L 370 97" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- guide-on-situational-awareness -->
  <rect x="90" y="158" width="240" height="44" rx="4" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="210" y="176" text-anchor="middle" font-size="13" fill="#1e293b">guide-on-situational-awareness</text>
  <text x="210" y="192" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">skill</text>

  <!-- evaluate-health -->
  <rect x="415" y="158" width="150" height="44" rx="4" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="176" text-anchor="middle" font-size="13" fill="#1e293b">evaluate-health</text>
  <text x="490" y="192" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">skill</text>
</svg>
